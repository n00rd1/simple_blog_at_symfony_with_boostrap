name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  APP_ENV: test
  APP_SECRET: 18ad18ee21cc27cbe29f7125ad42afe7
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/platform?serverVersion=18&charset=utf8
  MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
  MAILER_DSN: "null://null"

jobs:
  symfony:
    name: Symfony checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    defaults:
      run:
        working-directory: www

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: ctype, iconv, intl, mbstring, pdo_pgsql, zip
          coverage: none
          tools: composer:v2

      - name: Validate Composer metadata
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check PHP syntax
        run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Prepare database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction
          php bin/console app:ensure-admin-user --username=admin --password=admin

      - name: Lint Symfony config and templates
        run: |
          php bin/console lint:yaml config
          php bin/console lint:twig templates
          php bin/console lint:container

      - name: Run PHPUnit
        run: php bin/phpunit

  docker:
    name: Docker build and publish
    runs-on: ubuntu-latest
    needs: symfony

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build Compose images
        run: docker compose build php postgresql

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish PHP runtime image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: docker/php
          build-args: |
            USER_UID=1000
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/n00rd1fy-php:latest
            ghcr.io/${{ github.repository_owner }}/n00rd1fy-php:${{ github.sha }}
